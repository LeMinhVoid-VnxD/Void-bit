<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Void-bit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/lessons.css">
  <style>body{padding-top:4rem}</style>
</head>
<body class="bg-slate-950" style="display:none">

<nav class="glass fixed top-0 left-0 right-0 z-50 h-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg accent-bg flex items-center justify-center">
        <span class="text-[#0b1120] font-extrabold text-sm">{ }</span>
      </div>
      <span class="text-xl font-extrabold tracking-tight text-white">Void<span class="accent">-bit</span></span>
    </a>
    <div class="flex items-center gap-3">
      <span class="text-xs text-slate-500">Chat</span>
      <div id="navAvatarBtn" onclick="openProfileModal()" class="w-9 h-9 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-xs font-bold text-white cursor-pointer hover:ring-2 hover:ring-cyan-400/50 transition-all">?</div>
    </div>
  </div>
</nav>

<div id="chatPageContent" class="max-w-4xl mx-auto px-4 py-8"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/lessons-data.js"></script>
<script src="js/lang.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/forum-supabase.js"></script>
<script src="js/lessons.js"></script>
<script>var PAGE_TYPE = 'chat';</script>
<script src="js/app.js"></script>
<script>
function initChat() {
  document.body.style.display = 'block';
  if (!localStorage.getItem('voidbit_session')) { showAuthGate(); return; }
  forum.loggedIn = true;
  forum.myName = localStorage.getItem('voidbit_forum_name') || 'Anonymous';
  forum.myAvatar = localStorage.getItem('voidbit_forum_avatar') || '';
  renderNavProfile();
  renderChatPage();
}

function renderChatPage() {
  var container = $('#chatPageContent');
  if (!container) return;
  cleanupForum();
  checkSession();
  forum.view = 'user-list';
  forum.threadId = null;
  forum.dmUser = null;
  container.innerHTML =
    '<div class="mb-6">' +
      '<h2 class="text-2xl font-extrabold text-white">' + t('forum.tabChat') + '</h2>' +
      '<p class="text-sm text-slate-400 mt-1">' + t('chat.subtitle') + '</p>' +
    '</div>' +
    '<div id="onlineList" class="space-y-2 mb-8"></div>' +
    '<div>' +
      '<h4 class="text-sm font-bold text-white mb-3">' + t('chat.recent') + '</h4>' +
      '<div id="recentChats" class="space-y-2"></div>' +
    '</div>';
  lucide.createIcons();
  renderOnlineList($('#onlineList'));
  loadRecentChats();
  trackPresence();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initChat);
} else {
  initChat();
}
</script>
</body>
</html>
