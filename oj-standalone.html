<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OJ — Void-bit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="OJ/static/style.css">
  <style>
    body { padding-top: 4rem; background: var(--bg-primary); }
    .view { display: none; }
    .view.active { display: block; }
    .view.hidden { display: none; }
    .container { max-width: 1280px; margin: 0 auto; padding: 20px 24px; }
  </style>
</head>
<body>
  <nav class="glass fixed top-0 left-0 right-0 z-50 h-16" style="background:rgba(15,23,42,.85);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg accent-bg flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <span class="text-lg font-bold" style="color:var(--text-primary)">Void-bit</span>
      </a>
      <div class="flex items-center gap-2">
        <a href="index.html" class="nav-link">Trang chủ</a>
      </div>
    </div>
  </nav>

  <div id="toastContainer" class="toast-container"></div>

  <main class="container">
    <section id="view-problems" class="view active">
      <div class="section-header">
        <div class="header-title-area">
          <h2>Danh sách bài tập</h2>
          <p class="subtitle">Hãy giải các bài tập lập trình bên dưới để rèn luyện tư duy</p>
          <p id="debugCount" style="font-size:12px;color:var(--text-muted);margin-top:4px;"></p>
        </div>
      </div>
      <div class="filter-bar">
        <div class="category-tabs" id="categoryTabs">
          <button class="tab-btn active" data-cat="all">Tất cả</button>
          <button class="tab-btn" data-cat="dp">Quy hoạch động</button>
          <button class="tab-btn" data-cat="binary_search">Chặt nhị phân</button>
          <button class="tab-btn" data-cat="greedy">Tham lam</button>
          <button class="tab-btn" data-cat="graph">Đồ thị</button>
          <button class="tab-btn" data-cat="math">Toán học</button>
          <button class="tab-btn" data-cat="string">Xử lý xâu</button>
          <button class="tab-btn" data-cat="data_structure">Cấu trúc dữ liệu</button>
          <button class="tab-btn" data-cat="other">Khác</button>
        </div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Tìm tên bài...">
        </div>
      </div>
      <div class="table-container" id="problemsContainer">
        <table class="problems-table" id="problemsTable">
          <thead>
            <tr>
              <th style="width:80px">Trạng thái</th>
              <th>Tên bài tập</th>
              <th style="width:180px">Chủ đề</th>
              <th style="width:120px">Độ khó</th>
              <th style="width:90px">Rating</th>
              <th style="width:120px">Subtasks</th>
              <th style="width:120px">Số testcase</th>
            </tr>
          </thead>
          <tbody id="problemsTableBody"></tbody>
        </table>
        <div id="noProblemsMessage" class="no-data hidden">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <p>Không tìm thấy bài tập nào phù hợp.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="OJ/problems/problems-data.js"></script>
  <script src="OJ/problems/problems-all.js"></script>
  <script>
    // ======================================================================
    // Standalone OJ — fully self-contained list rendering
    // ======================================================================

    var currentCategory = 'all';
    var searchQuery = '';

    var CAT_NAMES = {
      dp:'Quy hoạch động', binary_search:'Chặt nhị phân', greedy:'Tham lam',
      graph:'Đồ thị', math:'Toán học', string:'Xử lý xâu',
      data_structure:'Cấu trúc dữ liệu', other:'Khác'
    };
    var DIFF_ORDER = { easy:1, medium:2, hard:3 };

    function getProblems() {
      if (typeof PROBLEMS_INDEX !== 'undefined' && PROBLEMS_INDEX) return PROBLEMS_INDEX;
      return [];
    }

    function renderList() {
      var body = document.getElementById('problemsTableBody');
      var noData = document.getElementById('noProblemsMessage');
      var debugEl = document.getElementById('debugCount');
      if (!body) return;
      var all = getProblems();
      var q = searchQuery.toLowerCase();
      var filtered = all.filter(function(p) {
        var mCat = currentCategory === 'all' || p.category === currentCategory;
        var mSearch = p.title.toLowerCase().indexOf(q) !== -1 || p.id.toLowerCase().indexOf(q) !== -1;
        return mCat && mSearch;
      });
      body.innerHTML = '';
      if (debugEl) debugEl.textContent = filtered.length + '/' + all.length + ' bài tập';
      if (filtered.length === 0) {
        if (noData) noData.classList.remove('hidden');
        return;
      }
      if (noData) noData.classList.add('hidden');
      filtered.forEach(function(p) {
        var tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.onclick = function() { window.location.hash = '#/problem/' + p.id; };
        var catName = CAT_NAMES[p.category] || p.category || 'Khác';
        var diffClass = p.difficulty || 'easy';
        tr.innerHTML = '<td><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><circle cx="12" cy="12" r="10"/></svg></td>' +
          '<td style="font-weight:500;color:var(--primary)">' + p.title + '</td>' +
          '<td><span class="tag">' + catName + '</span></td>' +
          '<td><span class="badge badge-' + diffClass + '">' + p.difficulty + '</span></td>' +
          '<td>' + (p.cf_rating ? '<span class="badge badge-rating">' + p.cf_rating + '</span>' : '-') + '</td>' +
          '<td>' + (p.subtask_count || 0) + ' subtasks</td>' +
          '<td>' + (p.test_count || 0) + ' tests</td>';
        body.appendChild(tr);
      });
    }

    // Category tabs
    document.addEventListener('DOMContentLoaded', function() {
      var tabs = (document.getElementById('categoryTabs') || {}).children;
      if (tabs) {
        for (var i = 0; i < tabs.length; i++) {
          (function(tab) {
            tab.addEventListener('click', function() {
              for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
              tab.classList.add('active');
              currentCategory = tab.getAttribute('data-cat') || 'all';
              renderList();
            });
          })(tabs[i]);
        }
      }
      var searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          searchQuery = this.value;
          renderList();
        });
      }
      renderList();
    });
  </script>
</body>
</html>
