<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Void-bit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="OJ/static/style.css">
  <style>
    body { padding-top: 4rem; background: var(--bg-primary); }
    #toastContainer { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .oj-container { max-width: 1000px; margin: 0 auto; padding: 20px 24px; }
    .profile-header { display: flex; align-items: center; gap: 24px; padding: 24px; border-radius: 12px; background: rgba(30,41,59,0.3); border: 1px solid var(--border-color); margin-bottom: 24px; flex-wrap: wrap; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: rgba(30,41,59,0.8); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; color: var(--text-muted); flex-shrink: 0; overflow: hidden; border: 3px solid rgba(59,130,246,0.3); }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { flex: 1; min-width: 200px; }
    .profile-info h1 { margin: 0 0 2px; font-size: 1.5rem; }
    .profile-info .username { color: var(--text-muted); font-size: 0.85rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { padding: 16px; border-radius: 8px; background: rgba(30,41,59,0.3); border: 1px solid var(--border-color); text-align: center; }
    .stat-card .num { font-size: 1.6rem; font-weight: 800; }
    .stat-card .lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .edit-form { margin-top: 12px; padding: 16px; border-radius: 8px; background: rgba(15,23,42,0.5); border: 1px solid var(--border-color); display: none; }
    .edit-form.show { display: block; }
    .edit-form label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
    .edit-form input { width: 100%; padding: 8px 12px; border-radius: 6px; background: rgba(30,41,59,0.5); border: 1px solid rgba(51,65,85,0.5); color: var(--text-primary); font-size: 0.85rem; outline: none; box-sizing: border-box; }
    .edit-form input:focus { border-color: var(--primary); }
    .btn-save { padding: 7px 18px; border-radius: 6px; border: none; background: linear-gradient(135deg,#00f0ff,#3b82f6); color: #fff; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
    .btn-cancel { padding: 7px 18px; border-radius: 6px; border: 1px solid var(--border-color); background: transparent; color: var(--text-muted); font-size: 0.8rem; cursor: pointer; }
    .btn-edit { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); font-size: 0.8rem; cursor: pointer; }
    .btn-edit:hover { border-color: var(--primary); color: var(--primary); }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .role-select { padding: 4px 8px; border-radius: 6px; background: rgba(30,41,59,0.8); border: 1px solid rgba(51,65,85,0.5); color: #e2e8f0; font-size: 0.8rem; outline: none; cursor: pointer; }
    .role-select:focus { border-color: #00f0ff; }
  </style>
</head>
<body>
  <nav class="glass fixed top-0 left-0 right-0 z-50 h-16" style="background:rgba(15,23,42,.85);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg accent-bg flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <span class="text-lg font-bold" style="color:var(--text-primary)">Void-bit</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="oj-new.html" class="nav-link text-sm">OJ</a>
        <a href="index.html" class="nav-link text-sm">Trang chủ</a>
      </div>
    </div>
  </nav>

  <div id="toastContainer"></div>

  <main class="oj-container">
    <div id="loginPrompt" style="display:none;text-align:center;padding:60px 20px">
      <p style="color:var(--text-muted);margin-bottom:16px">Vui lòng đăng nhập để xem trang cá nhân</p>
      <a href="index.html" style="display:inline-block;padding:10px 24px;border-radius:8px;background:linear-gradient(135deg,#00f0ff,#3b82f6);color:#fff;font-size:0.875rem;font-weight:600;text-decoration:none">Đăng nhập</a>
    </div>

    <div id="profileContent" style="display:none">
      <div class="profile-header" id="profileHeader">
        <div class="profile-avatar" id="avatarDisplay">
          <span id="avatarInit">?</span>
        </div>
        <div class="profile-info">
          <h1 id="displayNameDisplay">...</h1>
          <div class="username">@<span id="usernameDisplay">...</span></div>
          <div class="username">Tham gia: <span id="joinDateDisplay">...</span></div>
        </div>
        <button class="btn-edit" onclick="toggleEdit()">✎ Sửa hồ sơ</button>
      </div>

      <div class="edit-form" id="editForm">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
          <div>
            <label>Tên hiển thị</label>
            <input type="text" id="editDisplayName" maxlength="30" placeholder="Nhập tên hiển thị">
          </div>
          <div>
            <label>Avatar URL</label>
            <input type="url" id="editAvatarUrl" maxlength="500" placeholder="https://example.com/avatar.jpg">
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-save" onclick="saveProfile()">Lưu</button>
          <button class="btn-cancel" onclick="toggleEdit()">Huỷ</button>
        </div>
      </div>

      <div class="stat-grid" id="statGrid"></div>

      <div id="userManagementSection" style="display:none;margin-bottom:24px">
        <div class="section-title">👑 Quản lý người dùng</div>
        <div class="table-container" id="userManagementTable"></div>
      </div>

      <div class="section-title">Lịch sử nộp bài gần đây</div>
      <div class="table-container">
        <table class="problems-table" id="recentSubsTable">
          <thead>
            <tr>
              <th style="width:80px">Kết quả</th>
              <th>Bài tập</th>
              <th style="width:80px">Điểm</th>
              <th style="width:80px">Ngôn ngữ</th>
              <th style="width:150px">Thời gian</th>
            </tr>
          </thead>
          <tbody id="recentSubsBody"></tbody>
        </table>
        <div id="noSubs" class="no-data hidden">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <p>Chưa có bài nộp nào. <a href="oj-new.html" style="color:var(--primary)">Giải bài ngay</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="OJ/static/oj-init.js"></script>
  <script>
    var currentUser = null;

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    async function loadProfile() {
      var user = ojRequireAuth();
      if (!user) {
        document.getElementById('loginPrompt').style.display = 'block';
        return;
      }
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('profileContent').style.display = 'block';
      currentUser = user;

      try {
        var res = await ojdb.from('users').select('*').eq('username', user.username).single();
        if (!res.error && res.data) {
          var u = res.data;
          currentUser.displayName = u.display_name || user.displayName;
          currentUser.avatar = u.avatar_url || user.avatar;
          currentUser.role = u.role || 'Member';
          localStorage.setItem('voidbit_forum_name', currentUser.displayName);
          localStorage.setItem('voidbit_forum_avatar', currentUser.avatar);
          localStorage.setItem('voidbit_role', currentUser.role);
        }
      } catch(e) {}

      renderProfile();
      loadStatsAndSubs();
      renderUserManagement();
    }

    function renderProfile() {
      var u = currentUser;
      document.getElementById('usernameDisplay').textContent = u.username;
      document.getElementById('displayNameDisplay').textContent = u.displayName;
      document.getElementById('editDisplayName').value = u.displayName;
      document.getElementById('editAvatarUrl').value = u.avatar;

      var avatarEl = document.getElementById('avatarDisplay');
      if (u.avatar) {
        avatarEl.innerHTML = '<img src="' + esc(u.avatar) + '" alt="" onerror="this.remove();this.parentElement.innerHTML=\'' + esc(u.displayName.charAt(0).toUpperCase()) + '\';this.parentElement.style.fontSize=\'2rem\'" loading="lazy">';
      } else {
        avatarEl.innerHTML = '<span style="font-size:2rem;font-weight:800;color:var(--text-muted)">' + esc(u.displayName.charAt(0).toUpperCase()) + '</span>';
      }
    }

    function toggleEdit() {
      var f = document.getElementById('editForm');
      f.classList.toggle('show');
      if (f.classList.contains('show')) {
        document.getElementById('editDisplayName').value = currentUser.displayName;
        document.getElementById('editAvatarUrl').value = currentUser.avatar;
      }
    }

    async function saveProfile() {
      var newName = document.getElementById('editDisplayName').value.trim();
      var newAvatar = document.getElementById('editAvatarUrl').value.trim();
      if (!newName) { ojToast('Tên hiển thị không được để trống', 'error'); return; }

      try {
        var res = await ojdb.from('users').update({
          display_name: newName,
          avatar_url: newAvatar
        }).eq('username', currentUser.username);

        if (res.error) { ojToast('Lỗi: ' + res.error.message, 'error'); return; }

        currentUser.displayName = newName;
        currentUser.avatar = newAvatar;
        localStorage.setItem('voidbit_forum_name', newName);
        localStorage.setItem('voidbit_forum_avatar', newAvatar);

        renderProfile();
        document.getElementById('editForm').classList.remove('show');
        ojToast('Đã lưu hồ sơ', 'success');
      } catch(e) {
        ojToast('Lỗi kết nối', 'error');
      }
    }

    function canManageRole(currentRole, targetRole) {
      var c = getRoleInfo(currentRole);
      var t = getRoleInfo(targetRole);
      if (!c || !t) return false;
      if (c.id === 'Owner') return true;
      if (c.id === 'Admin') return t.level < c.level && t.level > 0;
      return false;
    }

    function renderUserManagement() {
      var section = document.getElementById('userManagementSection');
      if (!section) return;
      var role = currentUser.role || 'Member';
      if (!canManageRole(role, 'Member')) { section.style.display = 'none'; return; }
      section.style.display = 'block';

      ojdb.from('users').select('username, display_name, role').then(function(res) {
        var container = document.getElementById('userManagementTable');
        if (res.error || !res.data) { container.innerHTML = '<p class="text-red-400 text-sm">Lỗi tải dữ liệu</p>'; return; }
        var html = '<table class="problems-table"><thead><tr><th>Username</th><th>Display Name</th><th>Role</th><th>Hành động</th></tr></thead><tbody>';
        res.data.forEach(function(u) {
          var currentTargetRole = u.role || 'Member';
          var canEdit = canManageRole(role, currentTargetRole) || (role === 'Owner' && currentTargetRole !== 'Owner');
          var roleOptions = '';
          ROLES.forEach(function(r) {
            var allowed = role === 'Owner' || (role === 'Admin' && r.level < getRoleInfo(role).level);
            if (allowed) roleOptions += '<option value="' + r.id + '"' + (r.id === currentTargetRole ? ' selected' : '') + '>' + r.badge + ' ' + r.label + '</option>';
          });
          html += '<tr>' +
            '<td><span class="text-sm font-medium text-slate-200">' + esc(u.username) + '</span></td>' +
            '<td><span class="text-sm text-slate-400">' + esc(u.display_name || u.username) + '</span></td>' +
            '<td>' + getRoleBadge(currentTargetRole) + '</td>' +
            '<td>' + (canEdit ? '<select class="role-select" data-user="' + esc(u.username) + '" onchange="updateUserRole(this)">' + roleOptions + '</select>' : '<span class="text-xs text-slate-500">—</span>') + '</td>' +
            '</tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      });
    }

    async function updateUserRole(sel) {
      var username = sel.dataset.user;
      var newRole = sel.value;
      var oldRole = sel.options[sel.selectedIndex].defaultSelected ? sel.options[sel.selectedIndex].text : '';
      if (!confirm('Chuyển role của "' + username + '" thành ' + newRole + '?')) { sel.value = sel.querySelector('[selected]') ? sel.querySelector('[selected]').value : 'Member'; return; }
      try {
        var res = await ojdb.from('users').update({ role: newRole }).eq('username', username);
        if (res.error) { ojToast('Lỗi: ' + res.error.message, 'error'); return; }
        ojToast('Đã cập nhật role ' + username + ' → ' + newRole, 'success');
        renderUserManagement();
      } catch(e) { ojToast('Lỗi kết nối', 'error'); }
    }

    async function loadStatsAndSubs() {
      try {
        var res = await ojdb.from('submissions')
          .select('*')
          .eq('username', currentUser.username)
          .order('created_at', {ascending: false})
          .limit(100);

        if (res.error) { document.getElementById('statGrid').innerHTML = '<div style="color:#ef4444;font-size:0.85rem">Lỗi tải dữ liệu</div>'; return; }

        var subs = res.data || [];
        var total = subs.length;
        var ac = subs.filter(function(s){return s.verdict==='AC';}).length;
        var solved = {}; subs.forEach(function(s){if(s.verdict==='AC') solved[s.problem_id]=true;});
        var solvedCount = Object.keys(solved).length;
        var totalScore = 0, totalMax = 0;
        subs.forEach(function(s){ totalScore += s.score||0; totalMax += s.max_score||0; });
        var accuracy = totalMax > 0 ? Math.round(totalScore / totalMax * 100) : 0;

        document.getElementById('statGrid').innerHTML =
          '<div class="stat-card"><div class="num" style="color:#3b82f6">' + total + '</div><div class="lbl">Lượt nộp</div></div>' +
          '<div class="stat-card"><div class="num" style="color:#22c55e">' + ac + '</div><div class="lbl">AC</div></div>' +
          '<div class="stat-card"><div class="num" style="color:#fbbf24">' + solvedCount + '</div><div class="lbl">Bài đã giải</div></div>' +
          '<div class="stat-card"><div class="num" style="color:' + (accuracy >= 80 ? '#22c55e' : accuracy >= 50 ? '#f59e0b' : '#ef4444') + '">' + accuracy + '%</div><div class="lbl">Chính xác</div></div>';

        renderRecentSubs(subs.slice(0, 15));
      } catch(e) {
        document.getElementById('statGrid').innerHTML = '<div style="color:#ef4444;font-size:0.85rem">Lỗi tải dữ liệu</div>';
      }
    }

    function renderRecentSubs(subs) {
      var body = document.getElementById('recentSubsBody');
      var noData = document.getElementById('noSubs');
      body.innerHTML = '';
      if (subs.length === 0) { noData.classList.remove('hidden'); return; }
      noData.classList.add('hidden');

      subs.forEach(function(s) {
        var tr = document.createElement('tr');
        var dt = new Date(s.created_at);
        var timeStr = dt.toLocaleDateString('vi-VN') + ' ' + dt.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
        var vStyle = s.verdict === 'AC' ? 'background:rgba(34,197,94,0.15);color:#22c55e' : 'background:rgba(239,68,68,0.15);color:#ef4444';
        tr.innerHTML =
          '<td><span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:0.75rem;font-weight:700;' + vStyle + '">' + esc(s.verdict||'WA') + '</span></td>' +
          '<td><a href="problem.html?id=' + encodeURIComponent(s.problem_id) + '" style="color:var(--primary);text-decoration:none">' + esc(s.problem_title || s.problem_id) + '</a></td>' +
          '<td>' + (s.score != null ? s.score + '/' + s.max_score : '-') + '</td>' +
          '<td style="font-size:0.8rem;color:var(--text-muted)">' + esc(s.language||'cpp') + '</td>' +
          '<td style="font-size:0.8rem;color:var(--text-muted)">' + timeStr + '</td>';
        body.appendChild(tr);
      });
    }

    document.addEventListener('DOMContentLoaded', loadProfile);
  </script>
</body>
</html>
