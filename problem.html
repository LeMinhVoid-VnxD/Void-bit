<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problem — Void-bit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="OJ/static/style.css">
  <style>
    body { padding-top: 4rem; background: var(--bg-primary); }
    #toastContainer { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .oj-container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
    .oj-layout { display: grid; grid-template-columns: 1fr 500px; gap: 24px; align-items: start; }
    @media (max-width: 1024px) { .oj-layout { grid-template-columns: 1fr; } }
    .loader { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  </style>
</head>
<body>
  <nav class="glass fixed top-0 left-0 right-0 z-50 h-16" style="background:rgba(15,23,42,.85);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg accent-bg flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <span class="text-lg font-bold" style="color:var(--text-primary)">Void-bit</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="oj-new.html" class="nav-link text-sm">Danh sách</a>
        <a href="submissions.html" class="nav-link text-sm">Lịch sử</a>
        <a href="leaderboard.html" class="nav-link text-sm">BXH</a>
      </div>
    </div>
  </nav>

  <div id="toastContainer"></div>

  <main class="oj-container">
    <div class="top-bar">
      <a href="oj-new.html" class="btn-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Danh sách bài</a>
    </div>
    <div id="problemContent" class="loader">Đang tải dữ liệu...</div>
  </main>

  <script src="OJ/problems/problems-data.js"></script>
  <script src="OJ/problems/problems-all.js"></script>
  <script src="OJ/static/oj-init.js"></script>
  <script>
    var CAT_NAMES = { dp:'Quy hoạch động', binary_search:'Chặt nhị phân', greedy:'Tham lam', graph:'Đồ thị', math:'Toán học', string:'Xử lý xâu', data_structure:'Cấu trúc dữ liệu', other:'Khác' };

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function getParam(name) {
      var m = window.location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return m ? decodeURIComponent(m[1]) : null;
    }

    document.addEventListener('DOMContentLoaded', function() {
      var id = getParam('id');
      if (!id || typeof PROBLEMS_ALL === 'undefined' || !PROBLEMS_ALL[id]) {
        document.getElementById('problemContent').innerHTML = '<div class="loader"><p style="color:#ef4444;font-size:1.1rem">Không tìm thấy bài tập</p><a href="oj-new.html" style="display:inline-block;margin-top:16px;padding:10px 24px;border-radius:8px;background:var(--primary);color:#fff;text-decoration:none">Quay lại danh sách</a></div>';
        return;
      }
      renderProblem(PROBLEMS_ALL[id]);
    });

    function renderProblem(p) {
      document.title = p.title + ' — Void-bit';
      document.getElementById('problemContent').innerHTML =
        '<div class="oj-layout">' +
          '<article class="card statement-card" style="padding:24px">' +
            '<h1 class="prob-title" style="margin-bottom:12px">' + esc(p.title) + '</h1>' +
            '<div class="meta-pills" style="margin-bottom:20px">' +
              '<span class="meta-pill">' + esc(p.difficulty) + '</span>' +
              '<span class="meta-pill">' + esc(CAT_NAMES[p.category] || p.category || 'Khác') + '</span>' +
              '<span class="meta-pill">' + (p.time_limit||1) + 's</span>' +
              '<span class="meta-pill">' + (p.memory_limit||256) + 'MB</span>' +
              (p.cf_rating ? '<span class="meta-pill" style="background:rgba(251,191,36,0.15);color:#fbbf24">Rating: ' + p.cf_rating + '</span>' : '') +
            '</div>' +
            buildSection('Mô tả', p.description) +
            buildSection('Định dạng đầu vào', p.input_format) +
            buildSection('Định dạng đầu ra', p.output_format) +
            buildSection('Ràng buộc', p.constraints) +
            buildSubtasks(p.subtasks) +
            buildSamples(p.samples) +
          '</article>' +
          '<aside>' +
            '<div class="card" style="padding:0;overflow:hidden">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(30,41,59,0.5);border-bottom:1px solid var(--border-color)">' +
                '<select id="langSelect" style="padding:6px 12px;border-radius:6px;background:rgba(15,23,42,0.8);border:1px solid var(--border-color);color:var(--text-primary);font-size:0.8rem;outline:none"><option value="cpp">C++</option><option value="python">Python</option><option value="java">Java</option></select>' +
                '<button id="btnSubmit" onclick="handleSubmit()" style="padding:7px 18px;border-radius:6px;border:none;background:linear-gradient(135deg,#00f0ff,#3b82f6);color:#fff;font-size:0.8rem;font-weight:600;cursor:pointer">Nộp bài</button>' +
              '</div>' +
              '<textarea id="codeEditor" class="code-editor" spellcheck="false" placeholder="Viết mã nguồn..." style="width:100%;min-height:400px;padding:16px;background:var(--bg-primary);border:none;color:var(--text-primary);font-family:\'Fira Code\',monospace;font-size:0.85rem;resize:vertical;outline:none;tab-size:4"></textarea>' +
              '<div id="resultBox" style="display:none;padding:16px;border-top:1px solid var(--border-color)">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
                  '<span id="verdictText" style="font-weight:700;font-size:1rem">Judging...</span>' +
                  '<span id="scoreText" style="font-size:0.9rem;color:var(--text-muted)">- / -</span>' +
                '</div>' +
                '<div style="height:6px;border-radius:3px;background:var(--border-color);overflow:hidden;margin-bottom:12px"><div id="scoreBar" style="height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,#00f0ff,#3b82f6);transition:width .3s"></div></div>' +
                '<div id="verdictDetail" style="font-size:0.8rem;color:var(--text-muted);max-height:150px;overflow-y:auto"></div>' +
              '</div>' +
            '</div>' +
            '<div style="margin-top:16px">' +
              '<a href="submissions.html?problem=' + encodeURIComponent(p.id) + '" style="display:block;text-align:center;padding:10px;border-radius:8px;border:1px solid var(--border-color);color:var(--text-muted);font-size:0.85rem;text-decoration:none;transition:all .2s" onmouseover="this.style.borderColor=\'var(--primary)\';this.style.color=\'var(--primary)\'" onmouseout="this.style.borderColor=\'var(--border-color)\';this.style.color=\'var(--text-muted)\'">Xem lịch sử nộp bài</a>' +
            '</div>' +
          '</aside>' +
        '</div>';

      var ce = document.getElementById('codeEditor');
      if (ce) ce.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
      });
      var si = document.getElementById('searchInput');
    }

    function buildSection(title, content) {
      if (!content || !content.trim()) return '';
      return '<div class="prob-section"><h3>' + esc(title) + '</h3><div>' + content.replace(/\n/g,'<br>') + '</div></div>';
    }

    function buildSubtasks(subtasks) {
      if (!subtasks || !subtasks.length) return '';
      var h = '<div class="prob-section"><h3>Các subtask</h3><div>';
      subtasks.forEach(function(s) {
        h += '<div class="subtask-item"><div class="subtask-info"><span class="subtask-name">Subtask #' + s.id + '</span><span class="subtask-constraints">' + esc(s.constraints||'') + '</span></div><span class="subtask-points">' + s.points + ' điểm</span></div>';
      });
      return h + '</div></div>';
    }

    function buildSamples(samples) {
      if (!samples || !samples.length) return '<div class="prob-section"><h3>Ví dụ</h3><p class="text-secondary">Không có ví dụ mẫu.</p></div>';
      var h = '<div class="prob-section"><h3>Ví dụ</h3><div>';
      samples.forEach(function(s, i) {
        var eh = s.explanation ? '<div class="sample-explanation"><strong>Giải thích:</strong> ' + esc(s.explanation) + '</div>' : '';
        h += '<div class="sample-block"><div class="sample-header"><span>Ví dụ #' + (i+1) + '</span></div><pre class="sample-body">' + esc(s.input) + '</pre><div class="sample-header" style="border-top:1px solid var(--border-color)"><span>Kết quả mẫu</span></div><pre class="sample-body">' + esc(s.output) + '</pre>' + eh + '</div>';
      });
      return h + '</div></div>';
    }

    var WANDBOX_COMPILERS = { cpp:'gcc-13.1.0', python:'python3-10.0', java:'openjdk-java-18.0.1' };

    async function wandboxSubmit(code, compiler, stdin) {
      var r = await fetch('https://wandbox.org/api/compile.json', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({compiler:compiler, code:code, stdin:stdin, 'compiler-option-raw':'-O2', save:false})
      });
      if (!r.ok) { var txt = await r.text(); throw new Error('Wandbox ' + r.status + ': ' + txt.slice(0,100)); }
      return r.json();
    }

    function normalizeOutput(s) { return (s||'').replace(/\r\n/g,'\n').replace(/\s+$/,'').trim(); }

    function getVerdictStyle(v) {
      if (v === 'AC') return {color:'#22c55e', text:'AC', label:'Accepted'};
      if (v === 'WA') return {color:'#ef4444', text:'WA', label:'Wrong Answer'};
      if (v === 'TLE') return {color:'#f59e0b', text:'TLE', label:'Time Limit Exceeded'};
      if (v === 'RE') return {color:'#f97316', text:'RE', label:'Runtime Error'};
      if (v === 'CE') return {color:'#a855f7', text:'CE', label:'Compilation Error'};
      return {color:'#64748b', text:'ATT', label:'Attempted'};
    }

    async function handleSubmit() {
      var id = getParam('id');
      var prob = PROBLEMS_ALL[id];
      if (!prob) { ojToast('Không tìm thấy bài tập', 'error'); return; }

      var user = ojRequireAuth();
      if (!user) return;

      var code = document.getElementById('codeEditor');
      var langSel = document.getElementById('langSelect');
      var btn = document.getElementById('btnSubmit');
      if (!code || !code.value.trim()) { ojToast('Vui lòng viết mã nguồn', 'error'); return; }
      var lang = langSel ? langSel.value : 'cpp';
      var compiler = WANDBOX_COMPILERS[lang];
      if (!compiler) { ojToast('Ngôn ngữ không được hỗ trợ', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = 'Đang chấm...';
      var box = document.getElementById('resultBox');
      var vEl = document.getElementById('verdictText');
      var sEl = document.getElementById('scoreText');
      var pEl = document.getElementById('scoreBar');
      var dEl = document.getElementById('verdictDetail');
      box.style.display = 'block';
      vEl.textContent = 'Judging...'; vEl.style.color = '#64748b';
      sEl.textContent = '- / -'; pEl.style.width = '0%';
      dEl.innerHTML = '';

      try {
        var tcs = prob.test_cases || [];
        if (tcs.length === 0) { ojToast('Không có test case', 'error'); return; }
        var results = [];
        for (var i = 0; i < tcs.length; i++) {
          vEl.textContent = 'Đang chấm test #' + (i+1) + '/' + tcs.length + '...';
          var r = await wandboxSubmit(code.value, compiler, tcs[i].input);
          var v = 'WA';
          if (r.status === '0') {
            var t = r.time ? parseFloat(r.time.replace('s','')) : 0;
            if (t > (prob.time_limit||2)) v = 'TLE';
            else if (normalizeOutput(r.program_output) === normalizeOutput(tcs[i].output)) v = 'AC';
          } else {
            v = (r.signal && parseInt(r.signal) !== 0) ? 'RE' : 'CE';
          }
          results.push({i:i, v:v, stderr:r.compiler_error||r.program_error||'', stdout:r.program_output||''});
          if (v === 'CE' || v === 'RE') {
            dEl.innerHTML += '<div style="margin-top:4px;padding:8px;background:rgba(239,68,68,0.1);border-radius:4px;font-size:0.75rem;color:#f87171;white-space:pre-wrap;max-height:200px;overflow-y:auto">' + esc(results[results.length-1].stderr) + '</div>';
            break;
          }
          await new Promise(function(r) { setTimeout(r, 200); });
        }

        var ac = results.filter(function(r){return r.v==='AC';}).length;
        var total = tcs.length;
        var vs = getVerdictStyle(ac === total ? 'AC' : (ac > 0 ? 'WA' : results.some(function(r){return r.v==='CE'})?'CE':results.some(function(r){return r.v==='RE'})?'RE':results.some(function(r){return r.v==='TLE'})?'TLE':'WA'));
        vEl.textContent = vs.text + ' — ' + vs.label;
        vEl.style.color = vs.color;
        sEl.textContent = ac + ' / ' + total + ' testcase';
        pEl.style.width = Math.round(ac/total*100) + '%';
        pEl.style.background = ac === total ? 'linear-gradient(90deg,#22c55e,#16a34a)' : 'linear-gradient(90deg,#f59e0b,#ef4444)';

        var verdict = ac === total ? 'AC' : 'WA';
        var score = ac;
        var maxScore = total;

        try {
          var subRes = await ojdb.from('submissions').insert({
            username: user.username,
            display_name: user.displayName,
            avatar_url: user.avatar,
            problem_id: prob.id,
            problem_title: prob.title,
            code: code.value,
            language: lang,
            verdict: verdict,
            score: score,
            max_score: maxScore
          });
          if (subRes.error) console.warn('Supabase insert error:', subRes.error);
        } catch(e) { console.warn('Supabase error:', e); }

        ojToast(ac === total ? 'Accepted!' : 'Đạt ' + ac + '/' + total + ' testcase', ac === total ? 'success' : 'error');
      } catch(e) {
        console.error(e);
        vEl.textContent = 'Lỗi hệ thống'; vEl.style.color = '#ef4444';
        if (dEl) dEl.innerHTML = '<div style="color:#ef4444;font-size:0.8rem">' + esc(e.message) + '</div>';
        ojToast('Lỗi: ' + e.message, 'error');
      }
      btn.disabled = false;
      btn.innerHTML = 'Nộp bài';
    }

    try { if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); } catch(e) {}
  </script>
</body>
</html>
