<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OJ — Void-bit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="OJ/static/style.css">
  <style>
    body { padding-top: 4rem; background: var(--bg-primary); }
    .oj-container { max-width: 1280px; margin: 0 auto; padding: 20px 24px; }
    .problem-row { cursor: pointer; transition: background .15s; }
    .problem-row:hover { background: rgba(59,130,246,0.05); }
    .status-icon { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .refresh-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); cursor: pointer; font-size: 0.8rem; }
    .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>
  <nav class="glass fixed top-0 left-0 right-0 z-50 h-16" style="background:rgba(15,23,42,.85);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg accent-bg flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <span class="text-lg font-bold" style="color:var(--text-primary)">Void-bit</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="submissions.html" class="nav-link text-sm">Lịch sử</a>
        <a href="leaderboard.html" class="nav-link text-sm">BXH</a>
      </div>
    </div>
  </nav>

  <main class="oj-container">
    <div class="section-header">
      <div class="header-title-area">
        <h2>Danh sách bài tập</h2>
        <p class="subtitle">Giải các bài tập lập trình bên dưới để rèn luyện tư duy</p>
      </div>
      <button class="refresh-btn" onclick="renderList()">⟳ Làm mới</button>
    </div>
    <div class="filter-bar">
      <div class="category-tabs" id="categoryTabs">
        <button class="tab-btn active" data-cat="all">Tất cả</button>
        <button class="tab-btn" data-cat="dp">Quy hoạch động</button>
        <button class="tab-btn" data-cat="binary_search">Chặt nhị phân</button>
        <button class="tab-btn" data-cat="greedy">Tham lam</button>
        <button class="tab-btn" data-cat="graph">Đồ thị</button>
        <button class="tab-btn" data-cat="math">Toán học</button>
        <button class="tab-btn" data-cat="string">Xử lý xâu</button>
        <button class="tab-btn" data-cat="data_structure">Cấu trúc dữ liệu</button>
        <button class="tab-btn" data-cat="other">Khác</button>
      </div>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Tìm tên bài...">
      </div>
    </div>
    <div class="table-container">
      <table class="problems-table" id="problemsTable">
        <thead>
          <tr>
            <th style="width:60px">Trạng thái</th>
            <th>Tên bài tập</th>
            <th style="width:160px">Chủ đề</th>
            <th style="width:100px">Độ khó</th>
            <th style="width:80px">Rating</th>
            <th style="width:100px">Subtasks</th>
            <th style="width:110px">Testcase</th>
          </tr>
        </thead>
        <tbody id="problemsTableBody"></tbody>
      </table>
      <div id="noProblemsMessage" class="no-data hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <p>Không tìm thấy bài tập nào phù hợp.</p>
      </div>
    </div>
  </main>

  <script src="OJ/problems/problems-data.js"></script>
  <script src="OJ/problems/problems-all.js"></script>
  <script src="OJ/static/oj-init.js"></script>
  <script>
    var currCategory = 'all';
    var currQuery = '';
    var solvedMap = {};
    var CAT_NAMES = { dp:'Quy hoạch động', binary_search:'Chặt nhị phân', greedy:'Tham lam', graph:'Đồ thị', math:'Toán học', string:'Xử lý xâu', data_structure:'Cấu trúc dữ liệu', other:'Khác' };

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function statusIcon(pid) {
      if (!solvedMap[pid]) {
        return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><circle cx="12" cy="12" r="10"/></svg>';
      }
      if (solvedMap[pid] === 'AC') {
        return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
      }
      return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>';
    }

    async function loadSolvedStatus() {
      var user = ojUser();
      if (!user) { solvedMap = {}; renderList(); return; }
      try {
        var res = await ojdb.from('submissions').select('problem_id, verdict').eq('username', user.username);
        if (res.error) { solvedMap = {}; renderList(); return; }
        solvedMap = {};
        (res.data || []).forEach(function(s) {
          var pid = s.problem_id;
          if (!solvedMap[pid] || (s.verdict === 'AC' && solvedMap[pid] !== 'AC')) {
            solvedMap[pid] = s.verdict;
          }
        });
      } catch(e) { solvedMap = {}; }
      renderList();
    }

    function renderList() {
      var body = document.getElementById('problemsTableBody');
      var noData = document.getElementById('noProblemsMessage');
      if (!body) return;
      if (typeof PROBLEMS_INDEX === 'undefined' || !PROBLEMS_INDEX) {
        body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Đang tải dữ liệu...</td></tr>';
        return;
      }
      var q = currQuery.toLowerCase();
      var filtered = PROBLEMS_INDEX.filter(function(p) {
        return (currCategory === 'all' || p.category === currCategory) &&
               (p.title.toLowerCase().indexOf(q) !== -1 || p.id.toLowerCase().indexOf(q) !== -1);
      });
      body.innerHTML = '';
      if (filtered.length === 0) {
        if (noData) noData.classList.remove('hidden');
        return;
      }
      if (noData) noData.classList.add('hidden');
      filtered.forEach(function(p) {
        var tr = document.createElement('tr');
        tr.className = 'problem-row';
        tr.onclick = function() { window.location.href = 'problem.html?id=' + encodeURIComponent(p.id); };
        var cn = CAT_NAMES[p.category] || p.category || 'Khác';
        tr.innerHTML = [
          '<td>' + statusIcon(p.id) + '</td>',
          '<td style="font-weight:500;color:var(--primary)">' + esc(p.title) + '</td>',
          '<td><span class="tag">' + esc(cn) + '</span></td>',
          '<td><span class="badge badge-' + (p.difficulty||'easy') + '">' + (p.difficulty||'easy') + '</span></td>',
          '<td>' + (p.cf_rating ? '<span class="badge badge-rating">' + p.cf_rating + '</span>' : '-') + '</td>',
          '<td>' + (p.subtask_count||0) + '</td>',
          '<td>' + (p.test_count||0) + '</td>'
        ].join('');
        body.appendChild(tr);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      var tabs = document.getElementById('categoryTabs');
      if (tabs) {
        var btns = tabs.children;
        for (var i = 0; i < btns.length; i++) {
          (function(b) {
            b.addEventListener('click', function() {
              for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
              b.classList.add('active');
              currCategory = b.getAttribute('data-cat') || 'all';
              renderList();
            });
          })(btns[i]);
        }
      }
      var si = document.getElementById('searchInput');
      if (si) si.addEventListener('input', function() { currQuery = this.value; renderList(); });

      loadSolvedStatus();
      try { if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); } catch(e) {}
    });
  </script>
</body>
</html>
